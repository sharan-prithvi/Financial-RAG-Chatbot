services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot job: pulls the mistral model into the ollama container
  # the first time you run `docker compose up`. Exits once done.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "mistral"]
    restart: "no"

  app:
    build: .
    container_name: rag-app
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=mistral
    ports:
      - "8501:8501"
    volumes:
      - ./data/Documents:/app/data/Documents
      - chroma_data:/app/chroma_db